<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBB Bridge — Sales Invoices</title>
  <script src="https://dszd2mvdaxbkw.cloudfront.net/mbb-bridge/mbb-bridge-sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-muted: #64748b;
      --header-h:   54px;
      --log-h:      180px;

      --blue:   #3b82f6;
      --green:  #22c55e;
      --amber:  #f59e0b;
      --red:    #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* ─── Header ──────────────────────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 100;
    }

    .header-brand { font-size: 14px; font-weight: 700; flex-shrink: 0; }

    .header-divider {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    .header-company {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-company.loading {
      width: 120px; height: 13px;
      background: var(--bg);
      border-radius: 4px;
      animation: shimmer 1.4s ease infinite;
    }

    .header-spacer { flex: 1; }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      background: #f1f5f9;
      color: var(--text-muted);
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .conn-badge.connected { background: #dcfce7; color: #166534; }

    .conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ─── Page ────────────────────────────────────────────────────────────── */
    .page {
      margin-top: var(--header-h);
      padding: 20px;
      padding-bottom: calc(var(--log-h) + 28px);
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* ─── Auth ────────────────────────────────────────────────────────────── */
    .auth-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .input {
      flex: 1;
      min-width: 220px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--blue); background: white; }

    .token-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: #dcfce7;
      color: #166534;
    }
    .token-badge.visible { display: flex; }

    /* ─── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 34px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover   { opacity: 0.88; }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled{ opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-blue  { background: var(--blue);  color: white; }
    .btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

    /* ─── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar-spacer { flex: 1; }

    .count-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-info {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 60px;
      text-align: center;
    }

    /* ─── Table ───────────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--bg);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }

    .td-date   { white-space: nowrap; color: var(--text-muted); font-size: 12px; }
    .td-inv    { font-weight: 600; color: var(--blue); }
    .td-party  { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-amount { font-weight: 600; text-align: right; white-space: nowrap; }

    /* ─── Status pills ────────────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pill-paid     { background: #dcfce7; color: #166534; }
    .pill-unpaid   { background: #fee2e2; color: #991b1b; }
    .pill-partial  { background: #fef3c7; color: #92400e; }
    .pill-overdue  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ─── Skeleton ────────────────────────────────────────────────────────── */
    .skeleton {
      display: inline-block;
      height: 12px;
      border-radius: 4px;
      background: var(--bg);
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ─── Empty / error state ─────────────────────────────────────────────── */
    .state-row td {
      padding: 40px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .state-row.err td { color: #991b1b; }

    /* ─── Log panel ───────────────────────────────────────────────────────── */
    .log-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--log-h);
      background: #0f172a;
      border-top: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 14px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }

    .log-title {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .log-clear {
      font-size: 11px;
      color: #475569;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .log-clear:hover { color: #94a3b8; }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
    }

    .log-entry {
      display: flex;
      gap: 10px;
      padding: 2px 0;
      line-height: 1.6;
    }

    .log-tag { flex-shrink: 0; font-weight: 600; min-width: 56px; }

    .log-entry.out  .log-tag { color: #60a5fa; }
    .log-entry.in   .log-tag { color: #4ade80; }
    .log-entry.info .log-tag { color: #f59e0b; }
    .log-entry.err  .log-tag { color: #f87171; }

    .log-entry.out  .log-msg { color: #93c5fd; }
    .log-entry.in   .log-msg { color: #86efac; }
    .log-entry.info .log-msg { color: #fcd34d; }
    .log-entry.err  .log-msg { color: #fca5a5; }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">MBB Bridge · Staging</div>
    <div class="header-divider"></div>
    <div class="header-company loading" id="header-company"></div>
    <div class="header-spacer"></div>
    <div class="user-chip" id="user-chip" style="display:none">
      <div class="avatar" id="user-avatar">?</div>
      <span id="user-name"></span>
    </div>
    <div class="conn-badge" id="conn-badge">
      <div class="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
  </header>

  <!-- ─── Page ────────────────────────────────────────────────────────────── -->
  <div class="page">

    <!-- Auth card -->
    <div class="card">
      <div class="card-label">Auth</div>
      <div class="auth-row">
        <input class="input" id="token-input" type="password" placeholder="Bearer token…" />
        <input class="input" id="company-input" style="max-width:200px" placeholder="Company ID (auto from bridge)" />
        <button class="btn btn-ghost" onclick="setToken()">Set</button>
        <div class="token-badge" id="token-badge">✓ Ready</div>
      </div>
    </div>

    <!-- Vouchers card -->
    <div class="card">
      <div class="card-label">Sales Invoices</div>

      <div class="toolbar">
        <button class="btn btn-blue" id="fetch-btn" onclick="loadVouchers(1)">Fetch Vouchers</button>
        <span class="count-text" id="count-text"></span>
        <div class="toolbar-spacer"></div>
        <div class="page-nav" id="page-nav" style="display:none">
          <button class="btn btn-ghost" id="prev-btn" onclick="prevPage()" disabled>← Prev</button>
          <span class="page-info" id="page-info"></span>
          <button class="btn btn-ghost" id="next-btn" onclick="nextPage()" disabled>Next →</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Invoice #</th>
              <th>Party</th>
              <th style="text-align:right">Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="voucher-tbody">
            <tr class="state-row">
              <td colspan="5">Set a Bearer token and click Fetch Vouchers to load sales invoices.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- ─── Log panel ────────────────────────────────────────────────────────── -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">Message Log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="log-body">
      <div class="log-entry info">
        <span class="log-tag">info</span>
        <span class="log-msg">Initialising MBBridge…</span>
      </div>
    </div>
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════════════════
       STATE
    ════════════════════════════════════════════════════════════════════════ */
    var authToken   = '';
    var companyId   = '';
    var currentPage = 1;
    var totalCount  = 0;
    var perPage     = 25;

    /* ════════════════════════════════════════════════════════════════════════
       LOG
    ════════════════════════════════════════════════════════════════════════ */
    function log(dir, msg) {
      var body  = document.getElementById('log-body');
      var entry = document.createElement('div');
      entry.className = 'log-entry ' + dir;

      var tag = document.createElement('span');
      tag.className = 'log-tag';
      tag.textContent = dir === 'out'  ? '→ api'
                      : dir === 'in'   ? '← api'
                      : dir === 'err'  ? '✕ error'
                      : 'ℹ info';

      var m = document.createElement('span');
      m.className = 'log-msg';
      m.textContent = typeof msg === 'string' ? msg : JSON.stringify(msg);

      entry.appendChild(tag);
      entry.appendChild(m);
      body.appendChild(entry);
      body.scrollTop = body.scrollHeight;
    }

    function clearLog() { document.getElementById('log-body').innerHTML = ''; }

    /* ════════════════════════════════════════════════════════════════════════
       BRIDGE INIT
    ════════════════════════════════════════════════════════════════════════ */
    MBBridge.on({ type: 'MBB_SHELL_ACK', callback: function(msg) {
      var badge = document.getElementById('conn-badge');
      badge.className = 'conn-badge connected';
      document.getElementById('conn-label').textContent = 'Connected';
      log('info', 'Bridge connected ✓');
    }});

    MBBridge.init({ appId: 'staging-test-app', isDebug: true });

    // Load company + user for header; auto-fill company ID input
    MBBridge.company.getSelectedCompany().then(function(company) {
      var el = document.getElementById('header-company');
      el.className = 'header-company';
      el.textContent = company.name || '—';
      companyId = company.id || '';
      document.getElementById('company-input').value = companyId;
      log('info', 'Company: ' + company.name + ' (id: ' + companyId + ')');
    }).catch(function() {
      var el = document.getElementById('header-company');
      el.className = 'header-company';
      el.textContent = 'No company';
      log('info', 'Bridge: no company — enter Company ID manually');
    });

    MBBridge.user.getUser().then(function(user) {
      var name = user.name || user.email || '?';
      var initials = name.split(' ').map(function(w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
      document.getElementById('user-avatar').textContent = initials || '?';
      document.getElementById('user-name').textContent   = name;
      document.getElementById('user-chip').style.display = 'flex';
    }).catch(function() {});

    /* ════════════════════════════════════════════════════════════════════════
       AUTH TOKEN
    ════════════════════════════════════════════════════════════════════════ */
    function setToken() {
      var val = document.getElementById('token-input').value.trim();
      if (!val) return;
      authToken = val.replace(/^Bearer\s+/i, '');
      // Allow manual company ID override
      var manualCompany = document.getElementById('company-input').value.trim();
      if (manualCompany) companyId = manualCompany;
      document.getElementById('token-badge').className = 'token-badge visible';
      log('info', 'Token set ✓  company-id: ' + (companyId || '(empty)'));
    }

    document.getElementById('token-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') setToken();
    });

    /* ════════════════════════════════════════════════════════════════════════
       VOUCHERS
    ════════════════════════════════════════════════════════════════════════ */
    function formatDate(dateStr) {
      if (!dateStr) return '—';
      var d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function formatAmount(amt) {
      if (amt == null || amt === '') return '—';
      var num = parseFloat(amt);
      if (isNaN(num)) return amt;
      return '₹' + num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function statusPill(voucher) {
      var remaining = parseFloat(voucher.remaining_amount || '0');
      var total     = parseFloat(voucher.initial_payment_amount || voucher.amount || '0');
      if (remaining <= 0)            return '<span class="pill pill-paid">Paid</span>';
      if (remaining < total)         return '<span class="pill pill-partial">Partial</span>';
      var due = voucher.due_date ? new Date(voucher.due_date) < new Date() : false;
      if (due) return '<span class="pill pill-overdue">Overdue</span>';
      return '<span class="pill pill-unpaid">Unpaid</span>';
    }

    function showSkeleton() {
      var rows = '';
      for (var i = 0; i < 8; i++) {
        rows += '<tr>'
          + '<td class="td-date"><span class="skeleton" style="width:76px"></span></td>'
          + '<td class="td-inv"><span class="skeleton" style="width:70px"></span></td>'
          + '<td class="td-party"><span class="skeleton" style="width:' + (100 + i * 12) + 'px"></span></td>'
          + '<td class="td-amount" style="text-align:right"><span class="skeleton" style="width:64px"></span></td>'
          + '<td><span class="skeleton" style="width:52px"></span></td>'
          + '</tr>';
      }
      document.getElementById('voucher-tbody').innerHTML = rows;
    }

    function showState(message, isError) {
      var cls = isError ? 'state-row err' : 'state-row';
      document.getElementById('voucher-tbody').innerHTML =
        '<tr class="' + cls + '"><td colspan="5">' + message + '</td></tr>';
    }

    async function loadVouchers(page) {
      if (!authToken) {
        showState('Please set a Bearer token first.', false);
        log('err', 'No Bearer token set — enter token and click Set Token');
        return;
      }

      currentPage = page || 1;
      showSkeleton();
      document.getElementById('page-nav').style.display = 'none';
      document.getElementById('count-text').textContent = '';
      document.getElementById('fetch-btn').disabled = true;

      var params = new URLSearchParams({
        voucher_type: 'sales_invoice',
        status:       'final',
        page:         String(currentPage),
        per_page:     String(perPage),
        sort_by:      'voucher_date',
        sort_order:   'desc',
        filter:       'true',
      });

      var url = 'https://niobooks.in/api/web/vouchers?' + params.toString();

      log('out', 'GET ' + url);

      try {
        var res = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'company-id':    companyId,
            'Accept':        'application/json',
            'client':        'web',
          },
        });

        if (!res.ok) {
          var errText = await res.text();
          throw new Error('HTTP ' + res.status + ': ' + errText.slice(0, 120));
        }

        var data = await res.json();
        totalCount = data.total_count || 0;
        var vouchers = data.vouchers || [];

        log('in', 'total_count=' + totalCount + ', page=' + currentPage + ', received=' + vouchers.length + ' vouchers');

        if (data.is_empty_state || vouchers.length === 0) {
          showState('No sales invoices found.', false);
        } else {
          renderTable(vouchers);
        }

        // Update toolbar
        var totalPages = Math.ceil(totalCount / perPage);
        document.getElementById('count-text').textContent = totalCount + ' invoices';
        document.getElementById('page-info').textContent  = 'Page ' + currentPage + ' / ' + (totalPages || 1);
        document.getElementById('page-nav').style.display = 'flex';
        document.getElementById('prev-btn').disabled = currentPage <= 1;
        document.getElementById('next-btn').disabled = currentPage >= totalPages;

      } catch (err) {
        showState('Error: ' + err.message, true);
        log('err', err.message);
      } finally {
        document.getElementById('fetch-btn').disabled = false;
      }
    }

    function renderTable(vouchers) {
      var html = '';
      for (var i = 0; i < vouchers.length; i++) {
        var v = vouchers[i];
        var party = v.contact_name || '—';
        html += '<tr>'
          + '<td class="td-date">' + formatDate(v.date) + '</td>'
          + '<td class="td-inv">'  + (v.serial_number || '—') + '</td>'
          + '<td class="td-party">' + party + '</td>'
          + '<td class="td-amount">' + formatAmount(v.amount) + '</td>'
          + '<td>' + statusPill(v) + '</td>'
          + '</tr>';
      }
      document.getElementById('voucher-tbody').innerHTML = html;
    }

    function prevPage() {
      if (currentPage > 1) loadVouchers(currentPage - 1);
    }

    function nextPage() {
      var totalPages = Math.ceil(totalCount / perPage);
      if (currentPage < totalPages) loadVouchers(currentPage + 1);
    }
  </script>
</body>
</html>
